name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # macOS 빌드
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake qt@6
          brew install --cask vlc

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          make -j$(sysctl -n hw.ncpu)

      - name: Package (.app)
        run: |
          cd build
          test -d viewer.app
          chmod -R u+w viewer.app
          $(brew --prefix qt@6)/bin/macdeployqt viewer.app \
            -libpath=$(brew --prefix)/Frameworks \
            -always-overwrite
          chmod -R u+w viewer.app

          # VLC 라이브러리 복사
          mkdir -p viewer.app/Contents/Frameworks
          cp /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib viewer.app/Contents/Frameworks/
          cp /Applications/VLC.app/Contents/MacOS/lib/libvlccore.dylib viewer.app/Contents/Frameworks/
          cp -r /Applications/VLC.app/Contents/MacOS/plugins viewer.app/Contents/Frameworks/plugins

          if ! otool -l viewer.app/Contents/MacOS/viewer | grep -q "@executable_path/../Frameworks"; then
            install_name_tool -add_rpath "@executable_path/../Frameworks" viewer.app/Contents/MacOS/viewer
          fi

          rm -rf dist
          mkdir -p dist
          cp -R viewer.app dist/viewer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZiiLabViewer-macOS
          path: build/dist/

  # ============================================================
  # Windows 빌드
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64
          modules: qtmultimedia

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download VLC runtime and headers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $vlcBinUrl = "https://download.videolan.org/pub/videolan/vlc/3.0.21/win64/vlc-3.0.21-win64.zip"
          $vlcBinHash = "a0b7ec02b50adf6417eed014fb8df50af39690505a4225b85b3dc2ed17d14843"
          $vlcSrcUrl = "https://download.videolan.org/pub/videolan/vlc/3.0.21/vlc-3.0.21.tar.xz"
          $vlcSrcHash = "24dbbe1d7dfaeea0994d5def0bbde200177347136dbfe573f5b6a4cee25afbb0"

          Invoke-WebRequest -Uri $vlcBinUrl -OutFile vlc-win64.zip
          Invoke-WebRequest -Uri $vlcSrcUrl -OutFile vlc-src.tar.xz

          if ((Get-FileHash vlc-win64.zip -Algorithm SHA256).Hash.ToLower() -ne $vlcBinHash) {
            throw "Downloaded VLC runtime checksum mismatch"
          }

          if ((Get-FileHash vlc-src.tar.xz -Algorithm SHA256).Hash.ToLower() -ne $vlcSrcHash) {
            throw "Downloaded VLC source checksum mismatch"
          }

          Remove-Item C:\vlc-sdk -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item C:\vlc-src -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path C:\vlc-sdk | Out-Null
          New-Item -ItemType Directory -Path C:\vlc-src | Out-Null

          Expand-Archive -Path vlc-win64.zip -DestinationPath C:\vlc-sdk -Force
          tar -xf vlc-src.tar.xz -C C:\vlc-src

          $runtimeRoot = Get-ChildItem C:\vlc-sdk -Directory | Select-Object -First 1
          if (-not $runtimeRoot) {
            throw "Expanded VLC runtime directory not found"
          }

          Get-ChildItem $runtimeRoot.FullName -Force | Move-Item -Destination C:\vlc-sdk -Force
          Remove-Item $runtimeRoot.FullName -Recurse -Force

          $sourceRoot = Get-ChildItem C:\vlc-src -Directory | Select-Object -First 1
          if (-not $sourceRoot) {
            throw "Expanded VLC source directory not found"
          }

          New-Item -ItemType Directory -Path C:\vlc-sdk\include | Out-Null
          Copy-Item -Path (Join-Path $sourceRoot.FullName "include\vlc") `
            -Destination C:\vlc-sdk\include -Recurse -Force

          @(
            '#ifndef LIBVLC_VERSION_H'
            '# define LIBVLC_VERSION_H 1'
            '# define LIBVLC_VERSION_MAJOR    (3)'
            '# define LIBVLC_VERSION_MINOR    (0)'
            '# define LIBVLC_VERSION_REVISION (21)'
            '# define LIBVLC_VERSION_EXTRA    (0)'
            '# define LIBVLC_VERSION(maj,min,rev,extra) \'
            '         ((maj << 24) | (min << 16) | (rev << 8) | (extra))'
            '# define LIBVLC_VERSION_INT \'
            '         LIBVLC_VERSION(LIBVLC_VERSION_MAJOR, LIBVLC_VERSION_MINOR, \'
            '                        LIBVLC_VERSION_REVISION, LIBVLC_VERSION_EXTRA)'
            '#endif'
          ) | Set-Content -Path C:\vlc-sdk\include\vlc\libvlc_version.h -Encoding ASCII

          New-Item -ItemType Directory -Path C:\vlc-sdk\lib | Out-Null
          $exports = (& dumpbin /exports C:\vlc-sdk\libvlc.dll) |
            Select-String '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+([^\s=]+)' |
            ForEach-Object { $_.Matches[0].Groups[1].Value } |
            Sort-Object -Unique

          if (-not $exports) {
            throw "Failed to extract exports from libvlc.dll"
          }

          @("LIBRARY libvlc", "EXPORTS") + $exports |
            Set-Content -Path C:\vlc-sdk\lib\libvlc.def -Encoding ASCII

          & lib /def:C:\vlc-sdk\lib\libvlc.def /machine:x64 /out:C:\vlc-sdk\lib\libvlc.lib | Out-Host

          if (-not (Test-Path C:\vlc-sdk\include\vlc\vlc.h)) {
            throw "libVLC headers not found under C:\vlc-sdk"
          }

          if (-not (Test-Path C:\vlc-sdk\lib\libvlc.lib)) {
            throw "libVLC import library was not generated"
          }

      - name: Build
        shell: cmd
        run: |
          mkdir build && cd build
          cmake .. -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_PREFIX_PATH=%QT_ROOT_DIR% ^
            -DVLC_DIR=C:\vlc-sdk
          cmake --build .

      - name: Package
        shell: cmd
        run: |
          cd build
          if exist dist rmdir /S /Q dist
          mkdir dist
          copy viewer.exe dist\
          "%QT_ROOT_DIR%\bin\windeployqt.exe" --release --compiler-runtime dist\viewer.exe
          copy C:\vlc-sdk\*.dll dist\
          if exist C:\vlc-sdk\plugins.dat copy C:\vlc-sdk\plugins.dat dist\
          xcopy C:\vlc-sdk\plugins dist\plugins\ /E /I /Y
          if exist C:\vlc-sdk\lua xcopy C:\vlc-sdk\lua dist\lua\ /E /I /Y
          if exist C:\vlc-sdk\locale xcopy C:\vlc-sdk\locale dist\locale\ /E /I /Y

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZiiLabViewer-Windows
          path: build/dist/
