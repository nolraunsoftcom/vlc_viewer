name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # macOS 빌드
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install cmake qt@6
          brew install --cask vlc

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)
          make -j$(sysctl -n hw.ncpu)

      - name: Package (.app)
        run: |
          cd build
          test -d viewer.app
          chmod -R u+w viewer.app
          $(brew --prefix qt@6)/bin/macdeployqt viewer.app \
            -libpath=$(brew --prefix)/Frameworks \
            -always-overwrite
          chmod -R u+w viewer.app

          # VLC 라이브러리 복사
          mkdir -p viewer.app/Contents/Frameworks
          cp /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib viewer.app/Contents/Frameworks/
          cp /Applications/VLC.app/Contents/MacOS/lib/libvlccore.dylib viewer.app/Contents/Frameworks/
          cp -r /Applications/VLC.app/Contents/MacOS/plugins viewer.app/Contents/Frameworks/plugins

          if ! otool -l viewer.app/Contents/MacOS/viewer | grep -q "@executable_path/../Frameworks"; then
            install_name_tool -add_rpath "@executable_path/../Frameworks" viewer.app/Contents/MacOS/viewer
          fi

          rm -rf dist
          mkdir -p dist
          cp -R viewer.app dist/viewer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ZiiLabViewer-macOS
          path: build/dist/

  # ============================================================
  # Windows 빌드
  # ============================================================
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          arch: win64_msvc2022_64
          modules: qtmultimedia

      - name: Cache VLC SDK
        id: cache-vlc
        uses: actions/cache@v4
        with:
          path: C:\vlc-sdk
          key: vlc-sdk-windows-3.0.21-9d2b24d6bc4196b3da8d181a3878678ba272e2a7690321f8826da76a69b2fb9c-7z-sdk

      - name: Download VLC runtime and SDK
        if: steps.cache-vlc.outputs.cache-hit != 'true'
        shell: pwsh
        timeout-minutes: 15
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $vlcBinUrl = "https://download.videolan.org/pub/videolan/vlc/3.0.21/win64/vlc-3.0.21-win64.7z"
          $vlcBinHash = "9d2b24d6bc4196b3da8d181a3878678ba272e2a7690321f8826da76a69b2fb9c"

          Write-Host "Downloading VLC runtime and SDK..."
          curl.exe -L --fail --retry 5 --retry-delay 5 --connect-timeout 30 --speed-time 60 --speed-limit 1024 -o vlc-win64.7z $vlcBinUrl

          if ((Get-FileHash vlc-win64.7z -Algorithm SHA256).Hash.ToLower() -ne $vlcBinHash) {
            throw "Downloaded VLC archive checksum mismatch"
          }

          Remove-Item C:\vlc-sdk -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path C:\vlc-sdk | Out-Null

          Write-Host "Extracting VLC archive..."
          7z x vlc-win64.7z -oC:\vlc-sdk -y
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract VLC archive"
          }

          $runtimeRoot = Get-ChildItem C:\vlc-sdk -Directory | Select-Object -First 1
          if (-not $runtimeRoot) {
            throw "Expanded VLC archive directory not found"
          }

          Write-Host "Flattening VLC archive..."
          Get-ChildItem $runtimeRoot.FullName -Force | Move-Item -Destination C:\vlc-sdk -Force
          Remove-Item $runtimeRoot.FullName -Recurse -Force

          if (-not (Test-Path C:\vlc-sdk\sdk\include\vlc\vlc.h)) {
            throw "libVLC headers not found under C:\vlc-sdk\sdk"
          }
          if (-not (Test-Path C:\vlc-sdk\sdk\lib\libvlc.lib)) {
            throw "libVLC import library not found under C:\vlc-sdk\sdk"
          }

      - name: Validate VLC SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path C:\vlc-sdk\libvlc.dll)) {
            throw "libVLC runtime not found under C:\vlc-sdk"
          }
          if (-not (Test-Path C:\vlc-sdk\sdk\include\vlc\vlc.h)) {
            throw "libVLC headers not found under C:\vlc-sdk\sdk"
          }
          if (-not (Test-Path C:\vlc-sdk\sdk\lib\libvlc.lib)) {
            throw "libVLC import library not found under C:\vlc-sdk\sdk"
          }
          if (-not (Test-Path C:\vlc-sdk\plugins)) {
            throw "VLC plugins directory not found under C:\vlc-sdk"
          }

      - name: Cache MediaMTX
        id: cache-mediamtx
        uses: actions/cache@v4
        with:
          path: C:\mediamtx
          key: mediamtx-windows-amd64-v1.19.0

      - name: Download MediaMTX
        if: steps.cache-mediamtx.outputs.cache-hit != 'true'
        shell: pwsh
        timeout-minutes: 10
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $version = "v1.19.0"
          $asset = "mediamtx_v1.19.0_windows_amd64.zip"
          $baseUrl = "https://github.com/bluenviron/mediamtx/releases/download/$version"

          Write-Host "Downloading MediaMTX $version..."
          curl.exe -L --fail --retry 5 --retry-delay 5 --connect-timeout 30 -o $asset "$baseUrl/$asset"
          curl.exe -L --fail --retry 5 --retry-delay 5 --connect-timeout 30 -o checksums.sha256 "$baseUrl/checksums.sha256"

          $actualHash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          $expectedLine = Get-Content checksums.sha256 | Where-Object { $_ -match [regex]::Escape($asset) } | Select-Object -First 1
          if (-not $expectedLine) {
            throw "MediaMTX checksum entry not found for $asset"
          }
          $expectedHash = ($expectedLine -split '\s+')[0].ToLower()
          if ($actualHash -ne $expectedHash) {
            throw "MediaMTX checksum mismatch. expected=$expectedHash actual=$actualHash"
          }

          Remove-Item C:\mediamtx -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path C:\mediamtx | Out-Null
          Expand-Archive -Path $asset -DestinationPath C:\mediamtx -Force

          if (-not (Test-Path C:\mediamtx\mediamtx.exe)) {
            throw "mediamtx.exe not found after extraction"
          }

      - name: Validate MediaMTX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path C:\mediamtx\mediamtx.exe)) {
            throw "mediamtx.exe not found under C:\mediamtx"
          }
          C:\mediamtx\mediamtx.exe --version

      - name: Build
        shell: cmd
        run: |
          set "VSINSTALL="
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo Visual Studio with C++ tools was not found.
            exit /b 1
          )
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64
          if errorlevel 1 exit /b 1
          if not exist C:\vlc-sdk\sdk\lib\libvlc.lib (
            echo libVLC import library was not found.
            exit /b 1
          )
          mkdir build && cd build
          cmake .. -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_PREFIX_PATH=%QT_ROOT_DIR% ^
            -DVLC_DIR=C:\vlc-sdk ^
            -DMEDIAMTX_EXECUTABLE=C:/mediamtx/mediamtx.exe
          cmake --build .

      - name: Package
        shell: cmd
        run: |
          cd build
          if exist dist rmdir /S /Q dist
          mkdir dist
          copy viewer.exe dist\
          copy mediamtx.exe dist\
          "%QT_ROOT_DIR%\bin\windeployqt.exe" --release --compiler-runtime dist\viewer.exe
          copy C:\vlc-sdk\*.dll dist\
          if exist C:\vlc-sdk\plugins.dat copy C:\vlc-sdk\plugins.dat dist\
          xcopy C:\vlc-sdk\plugins dist\plugins\ /E /I /Y
          if exist C:\vlc-sdk\lua xcopy C:\vlc-sdk\lua dist\lua\ /E /I /Y
          if exist C:\vlc-sdk\locale xcopy C:\vlc-sdk\locale dist\locale\ /E /I /Y

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ZiiLabViewer-Windows
          path: build/dist/
